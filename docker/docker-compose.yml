version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: autodev-postgres
    environment:
      POSTGRES_DB: autodev_notes
      POSTGRES_USER: autodev
      POSTGRES_PASSWORD: autodev123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - autodev-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: autodev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - autodev-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: autodev-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: autodev
      RABBITMQ_DEFAULT_PASS: autodev123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - autodev-network

  # MinIO (object storage)
  minio:
    image: minio/minio:latest
    container_name: autodev-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: autodev
      MINIO_ROOT_PASSWORD: autodev123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - autodev-network

  # Neo4j (knowledge graph)
  neo4j:
    image: neo4j:5.15-community
    container_name: autodev-neo4j
    environment:
      NEO4J_AUTH: neo4j/autodev123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - autodev-network

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.11.1
    container_name: autodev-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - autodev-network

  # Nacos (service registry)
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: autodev-nacos
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=postgresql
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=nacos
      - POSTGRES_USER=autodev
      - POSTGRES_PASSWORD=autodev123
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      - postgres
    networks:
      - autodev-network

  # ==========================================
  # Application Services
  # ==========================================

  # --- Backend Java Services ---

  gateway:
    build:
      context: ../backend/gateway
      dockerfile: Dockerfile
    container_name: autodev-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - nacos
      - redis
    networks:
      - autodev-network

  user-service:
    build:
      context: ../backend/user-service
      dockerfile: Dockerfile
    container_name: autodev-user-service
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres
      - nacos
      - redis
    networks:
      - autodev-network

  course-service:
    build:
      context: ../backend/course-service
      dockerfile: Dockerfile
    container_name: autodev-course-service
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres
      - nacos
    networks:
      - autodev-network

  note-service:
    build:
      context: ../backend/note-service
      dockerfile: Dockerfile
    container_name: autodev-note-service
    ports:
      - "8083:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres
      - nacos
      - minio
    networks:
      - autodev-network

  ai-gateway:
    build:
      context: ../backend/ai-gateway
      dockerfile: Dockerfile
    container_name: autodev-ai-gateway
    ports:
      - "8084:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - nacos
      - rabbitmq
    networks:
      - autodev-network

  # --- AI Python Services ---

  note-generator:
    build:
      context: ../ai-service
      dockerfile: note-generator/Dockerfile
    container_name: autodev-note-generator
    ports:
      - "8091:8000"
    environment:
      - AI_SERVICE_TYPE=note-generator
    depends_on:
      - rabbitmq
    networks:
      - autodev-network

  rag-service:
    build:
      context: ../ai-service
      dockerfile: rag-service/Dockerfile
    container_name: autodev-rag-service
    ports:
      - "8092:8000"
    environment:
      - AI_SERVICE_TYPE=rag
    depends_on:
      - rabbitmq
      - elasticsearch
    networks:
      - autodev-network

  analysis-service:
    build:
      context: ../ai-service
      dockerfile: analysis-service/Dockerfile
    container_name: autodev-analysis-service
    ports:
      - "8093:8000"
    environment:
      - AI_SERVICE_TYPE=analysis
    depends_on:
      - rabbitmq
    networks:
      - autodev-network

  grading-service:
    build:
      context: ../ai-service
      dockerfile: grading-service/Dockerfile
    container_name: autodev-grading-service
    ports:
      - "8094:8000"
    environment:
      - AI_SERVICE_TYPE=grading
    depends_on:
      - rabbitmq
    networks:
      - autodev-network

  # --- Frontend ---

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: autodev-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway
    networks:
      - autodev-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  neo4j_data:
  es_data:

networks:
  autodev-network:
    driver: bridge
