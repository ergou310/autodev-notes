name: AutoDev Notes CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/autodev-notes

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Lint Java services
        run: |
          for svc in user-service course-service note-service ai-gateway gateway; do
            echo "::group::Lint $svc"
            cd backend/$svc
            mvn -B compile -DskipTests 2>&1 | tail -5
            cd ../..
            echo "::endgroup::"
          done

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint Python services
        run: |
          pip install ruff
          ruff check ai-service/ || true

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Lint Frontend
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          npx tsc --noEmit || true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: autodev_test
          POSTGRES_USER: autodev
          POSTGRES_PASSWORD: test123
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U autodev"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Test Java services
        run: |
          for svc in user-service course-service note-service ai-gateway gateway; do
            echo "::group::Test $svc"
            cd backend/$svc
            mvn -B test || true
            cd ../..
            echo "::endgroup::"
          done

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test Python services
        run: |
          pip install -r ai-service/requirements.txt pytest httpx
          for svc in note-generator rag-service analysis-service grading-service; do
            echo "::group::Test $svc"
            cd ai-service/$svc
            python -m pytest -x --tb=short 2>/dev/null || echo "No tests found for $svc"
            cd ../..
            echo "::endgroup::"
          done

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Test Frontend
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          CI=true npx react-scripts test --watchAll=false --passWithNoTests

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: user-service
            context: backend/user-service
            dockerfile: backend/user-service/Dockerfile
          - name: course-service
            context: backend/course-service
            dockerfile: backend/course-service/Dockerfile
          - name: note-service
            context: backend/note-service
            dockerfile: backend/note-service/Dockerfile
          - name: ai-gateway
            context: backend/ai-gateway
            dockerfile: backend/ai-gateway/Dockerfile
          - name: gateway
            context: backend/gateway
            dockerfile: backend/gateway/Dockerfile
          - name: note-generator
            context: ai-service
            dockerfile: ai-service/note-generator/Dockerfile
          - name: rag-service
            context: ai-service
            dockerfile: ai-service/rag-service/Dockerfile
          - name: analysis-service
            context: ai-service
            dockerfile: ai-service/analysis-service/Dockerfile
          - name: grading-service
            context: ai-service
            dockerfile: ai-service/grading-service/Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
