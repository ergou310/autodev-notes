server:
  port: 8084

spring:
  application:
    name: ai-gateway
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

# Python AI 服务地址
ai:
  services:
    note-generator: http://localhost:8091
    rag-service: http://localhost:8092
    analysis-service: http://localhost:8093
    grading-service: http://localhost:8094

sa-token:
  token-name: Authorization
  timeout: 86400
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

logging:
  level:
    com.autodev: debug
